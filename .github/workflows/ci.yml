# Bogo CI — L1 + G1 + G2 via base-ci, L2 Worker E2E, L3 Playwright
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────
  # L1 (Unit tests) + G1 (Typecheck + Lint) + G2 (Gitleaks + OSV)
  # ─────────────────────────────────────────────────────
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@aec4adc1a817c56790d1698329ef9398a15a754a  # v2026.5
    with:
      bun-version: "1.3.11"
      osv-config: "osv-scanner.toml"
      enable-l2: "false"
      upload-coverage: "false"
    secrets: inherit

  # ─────────────────────────────────────────────────────
  # Coverage gates: structural route + page coverage + clip.yaml schema
  # ─────────────────────────────────────────────────────
  coverage-gates:
    name: "Coverage Gates"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout bogo
        uses: actions/checkout@v4
        with:
          path: bogo

      - name: Checkout clip (sibling for clip.yaml validation)
        uses: actions/checkout@v4
        with:
          repository: nocoo/clip
          path: clip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies (bogo)
        run: cd bogo && bun install --frozen-lockfile

      - name: Install dependencies (clip)
        run: cd clip && bun install --frozen-lockfile

      - name: "G: Route coverage (L2)"
        run: cd bogo && bun run gate:routes

      - name: "G: Page coverage (L3)"
        run: cd bogo && bun run gate:pages

      - name: "G: clip.yaml validates against generator"
        env:
          BOGO_REQUIRE_CLI_E2E: "1"
        run: cd bogo && bun run gate:clip-yaml

  # ─────────────────────────────────────────────────────
  # L2: Worker E2E — local wrangler miniflare
  # ─────────────────────────────────────────────────────
  l2-e2e:
    name: "L2 Worker E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared
        run: bun run build

      - name: "L2: Worker E2E tests"
        run: bun turbo test:e2e --filter=@bogo/worker

  # ─────────────────────────────────────────────────────
  # L3: Playwright browser E2E
  # ─────────────────────────────────────────────────────
  l3-playwright:
    name: "L3 Playwright E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared + UI
        run: bun run build

      - name: Install Playwright browsers
        run: cd packages/ui && bunx playwright install chromium --with-deps

      - name: "L3: Playwright E2E tests"
        run: cd packages/ui && bunx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/ui/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────
  # CLI E2E: clip-generated bogo CLI end-to-end (login + CRUD + revoke)
  # ─────────────────────────────────────────────────────
  cli-e2e:
    name: "CLI E2E (clip-generated bogo CLI)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOGO_REQUIRE_CLI_E2E: "1"
    steps:
      - name: Checkout bogo
        uses: actions/checkout@v4
        with:
          path: bogo

      - name: Checkout clip (sibling, fallback runner)
        uses: actions/checkout@v4
        with:
          repository: nocoo/clip
          path: clip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies (bogo)
        run: cd bogo && bun install --frozen-lockfile

      - name: Install dependencies (clip)
        run: cd clip && bun install --frozen-lockfile

      - name: Build static (wrangler needs packages/worker/static)
        run: cd bogo && bun run build

      - name: "CLI E2E: login + CRUD + revoke"
        run: cd bogo && bun run test:cli-e2e
