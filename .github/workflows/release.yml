# Bogo CD — Deploy Worker + static assets to Cloudflare
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v0.1.0)"
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────────────
  # Continuous deploy on CI green (main)
  # ─────────────────────────────────────────────────────
  deploy-main:
    name: Deploy Worker (main)
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared + UI
        run: bun run build

      - name: Deploy Worker
        run: cd packages/worker && npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify /api/live
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://bogo.hexly.ai/api/live)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /api/live returned $STATUS"
            exit 1
          fi
          echo "✔ /api/live returned 200"

  # ─────────────────────────────────────────────────────
  # Tagged release: enforces tag == package.json version
  # ─────────────────────────────────────────────────────
  deploy-tagged:
    name: Deploy Worker (tagged)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "❌ Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared + UI
        run: bun run build

      - name: Deploy Worker
        run: cd packages/worker && npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify /api/live
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://bogo.hexly.ai/api/live)
          if [ "$STATUS" != "200" ]; then
            echo "❌ /api/live returned $STATUS"
            exit 1
          fi
          echo "✔ /api/live returned 200"
