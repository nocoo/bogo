name: "Bogo API"
alias: bogo
version: "0.5.3"
baseUrl: "https://api.bogo.hexly.ai"
auth:
  type: browser-login
  # loginUrl points at the CF-Access-protected host so the consent flow
  # works (the worker reads userEmail from a real CF Access JWT). All
  # other CLI requests go to api.bogo.hexly.ai via baseUrl, which is NOT
  # behind CF Access — the worker's bearer middleware is authoritative
  # there. See docs/features/02-cli.md §7 and docs/features/03-self-hosting.md.
  loginUrl: "https://bogo.hexly.ai/api/auth/cli"
  tokenParam: api_key
  headerName: Authorization
  headerPrefix: Bearer

endpoints:
  # -------------------- Live + Me --------------------
  - { name: live, method: GET, path: /api/live, description: "Liveness check (route is public; CLI still injects Authorization)" }

  - name: me
    method: GET
    path: /api/me
    description: "Current user info (email)"

  # -------------------- Workspaces --------------------
  - { name: workspaces-list, method: GET, path: /api/workspaces, description: "List own workspaces" }

  - name: workspaces-create
    method: POST
    path: /api/workspaces
    description: "Create a new workspace"
    params:
      body:
        name: { type: string, required: true }

  - name: workspaces-get
    method: GET
    path: "/api/workspaces/:id"
    description: "Get a workspace by id"
    params:
      path: { id: { type: string, required: true } }

  - name: workspaces-update
    method: PUT
    path: "/api/workspaces/:id"
    description: "Rename a workspace"
    params:
      path: { id: { type: string, required: true } }
      body: { name: { type: string, required: true } }

  - name: workspaces-delete
    method: DELETE
    path: "/api/workspaces/:id"
    description: "Delete a workspace"
    params:
      path: { id: { type: string, required: true } }

  # -------------------- Persons --------------------
  - name: persons-list
    method: GET
    path: "/api/w/:wid/persons"
    description: "List persons in workspace (optionally filtered by tags)"
    params:
      path: { wid: { type: string, required: true } }
      query:
        tagIds: { type: string, description: "Comma-separated tag IDs" }

  - name: persons-get
    method: GET
    path: "/api/w/:wid/persons/:id"
    description: "Get a person by id"
    params:
      path:
        wid: { type: string, required: true }
        id: { type: string, required: true }

  - name: persons-create
    method: POST
    path: "/api/w/:wid/persons"
    description: "Add a person under a manager (root is auto-created with workspace)"
    params:
      path: { wid: { type: string, required: true } }
      body:
        name:            { type: string, required: true }
        managerId:       { type: string, required: true, description: "UUID of parent manager" }
        title:           { type: string }
        dottedManagerId: { type: string }
        avatarUrl:       { type: string }

  - name: persons-update
    method: PUT
    path: "/api/w/:wid/persons/:id"
    description: "Update person fields"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }
      body:
        name:            { type: string }
        title:           { type: string }
        dottedManagerId: { type: string }
        avatarUrl:       { type: string }

  - name: persons-move
    method: PUT
    path: "/api/w/:wid/persons/:id/move"
    description: "Move person under a new manager (CLI cannot set managerId=null; use UI for promote-to-root)"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }
      body:
        managerId: { type: string, required: true }

  - name: persons-delete
    method: DELETE
    path: "/api/w/:wid/persons/:id"
    description: "Delete person (must have no reports)"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  - name: persons-documents
    method: GET
    path: "/api/w/:wid/persons/:id/documents"
    description: "Documents attached to this person (summary; no content — fetch documents-get for body)"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  # -------------------- Fields --------------------
  - name: fields-list
    method: GET
    path: "/api/w/:wid/fields"
    description: "List custom field definitions"
    params:
      path: { wid: { type: string, required: true } }

  - name: fields-create
    method: POST
    path: "/api/w/:wid/fields"
    description: "Create custom field definition; pass options=a,b in query when fieldType=select"
    params:
      path: { wid: { type: string, required: true } }
      query:
        options: { type: string, description: "Comma-separated select options" }
      body:
        name:         { type: string, required: true }
        fieldType:    { type: string, required: true, description: "text|number|date|select|boolean" }
        required:     { type: boolean, description: "Pass --required true / --required false" }
        defaultValue: { type: string }

  - name: fields-update
    method: PUT
    path: "/api/w/:wid/fields/:id"
    description: "Update field definition; pass options=a,b in query to replace select options"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }
      query:
        options: { type: string, description: "Comma-separated select options" }
      body:
        name:         { type: string }
        fieldType:    { type: string }
        required:     { type: boolean }
        defaultValue: { type: string }
        sortOrder:    { type: number }

  - name: fields-delete
    method: DELETE
    path: "/api/w/:wid/fields/:id"
    description: "Delete field definition (cascades to values)"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  - name: fields-values-get
    method: GET
    path: "/api/w/:wid/fields/values/:personId"
    description: "Get all field values for a person"
    params:
      path:
        wid:      { type: string, required: true }
        personId: { type: string, required: true }

  - name: fields-values-set
    method: PUT
    path: "/api/w/:wid/fields/values/:personId/:fieldDefId"
    description: "Set a single field value for a person"
    params:
      path:
        wid:        { type: string, required: true }
        personId:   { type: string, required: true }
        fieldDefId: { type: string, required: true }
      body:
        value: { type: string, required: true }

  # -------------------- Doc Types --------------------
  - name: doc-types-list
    method: GET
    path: "/api/w/:wid/doc-types"
    description: "List document types"
    params:
      path: { wid: { type: string, required: true } }

  - name: doc-types-create
    method: POST
    path: "/api/w/:wid/doc-types"
    description: "Create a document type"
    params:
      path: { wid: { type: string, required: true } }
      body:
        name:  { type: string, required: true }
        color: { type: string }

  - name: doc-types-update
    method: PUT
    path: "/api/w/:wid/doc-types/:id"
    description: "Update document type"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }
      body:
        name:      { type: string }
        color:     { type: string }
        sortOrder: { type: number }

  - name: doc-types-delete
    method: DELETE
    path: "/api/w/:wid/doc-types/:id"
    description: "Delete document type (nullifies references)"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  # -------------------- Documents --------------------
  - name: documents-list
    method: GET
    path: "/api/w/:wid/documents"
    description: "List documents (summary; no content — fetch documents-get for body); filterable by tags"
    params:
      path: { wid: { type: string, required: true } }
      query:
        tagIds: { type: string, description: "Comma-separated tag IDs" }

  - name: documents-get
    method: GET
    path: "/api/w/:wid/documents/:id"
    description: "Get a document"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  - name: documents-create
    method: POST
    path: "/api/w/:wid/documents"
    description: "Create document; pass personIds=uuid-a,uuid-b in query to attach"
    params:
      path: { wid: { type: string, required: true } }
      query:
        personIds: { type: string, description: "Comma-separated person UUIDs" }
      body:
        title:     { type: string, required: true }
        content:   { type: string }
        typeId:    { type: string }
        eventDate: { type: string, description: "ISO date YYYY-MM-DD" }

  - name: documents-update
    method: PUT
    path: "/api/w/:wid/documents/:id"
    description: "Update document (auto-versions on content change)"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }
      body:
        title:     { type: string }
        content:   { type: string }
        typeId:    { type: string }
        eventDate: { type: string }

  - name: documents-delete
    method: DELETE
    path: "/api/w/:wid/documents/:id"
    description: "Delete document"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  - name: documents-versions
    method: GET
    path: "/api/w/:wid/documents/:id/versions"
    description: "List immutable version history (summary; no content — fetch documents-version for body)"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  - name: documents-version
    method: GET
    path: "/api/w/:wid/documents/:id/versions/:version"
    description: "Get a single version with full content (for diff or raw read)"
    params:
      path:
        wid:     { type: string, required: true }
        id:      { type: string, required: true }
        version: { type: string, required: true, description: "Positive integer; clip CLI passes as string" }

  - name: documents-persons-list
    method: GET
    path: "/api/w/:wid/documents/:id/persons"
    description: "List people on a document"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  - name: documents-persons-add
    method: POST
    path: "/api/w/:wid/documents/:id/persons"
    description: "Attach a person to a document"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }
      body:
        personId: { type: string, required: true }
        role:     { type: string }

  - name: documents-persons-remove
    method: DELETE
    path: "/api/w/:wid/documents/:id/persons/:personId"
    description: "Detach a person from a document"
    params:
      path:
        wid:      { type: string, required: true }
        id:       { type: string, required: true }
        personId: { type: string, required: true }

  # -------------------- Tags --------------------
  - name: tags-list
    method: GET
    path: "/api/w/:wid/tags"
    description: "List tags (filterable by scope)"
    params:
      path: { wid: { type: string, required: true } }
      query:
        scope:         { type: string, description: "document|person" }
        includeCounts: { type: boolean, description: "Pass --includeCounts true to include counts" }

  - name: tags-stats
    method: GET
    path: "/api/w/:wid/tags/stats"
    description: "Tag usage distribution (scope required)"
    params:
      path: { wid: { type: string, required: true } }
      query:
        scope: { type: string, required: true, description: "document|person" }

  - name: tags-create
    method: POST
    path: "/api/w/:wid/tags"
    description: "Create a tag"
    params:
      path: { wid: { type: string, required: true } }
      body:
        name:      { type: string, required: true }
        scope:     { type: string, required: true, description: "document|person" }
        color:     { type: string, description: "Hex #RRGGBB" }
        sortOrder: { type: number }

  - name: tags-update
    method: PUT
    path: "/api/w/:wid/tags/:id"
    description: "Update a tag"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }
      body:
        name:      { type: string }
        color:     { type: string }
        sortOrder: { type: number }

  - name: tags-delete
    method: DELETE
    path: "/api/w/:wid/tags/:id"
    description: "Delete a tag (cascades to assignments)"
    params:
      path:
        wid: { type: string, required: true }
        id:  { type: string, required: true }

  - name: tags-documents-add
    method: PUT
    path: "/api/w/:wid/tags/:id/documents/:docId"
    description: "Assign tag to a document"
    params:
      path:
        wid:   { type: string, required: true }
        id:    { type: string, required: true }
        docId: { type: string, required: true }

  - name: tags-documents-remove
    method: DELETE
    path: "/api/w/:wid/tags/:id/documents/:docId"
    description: "Remove tag from a document"
    params:
      path:
        wid:   { type: string, required: true }
        id:    { type: string, required: true }
        docId: { type: string, required: true }

  - name: tags-persons-add
    method: PUT
    path: "/api/w/:wid/tags/:id/persons/:personId"
    description: "Assign tag to a person"
    params:
      path:
        wid:      { type: string, required: true }
        id:       { type: string, required: true }
        personId: { type: string, required: true }

  - name: tags-persons-remove
    method: DELETE
    path: "/api/w/:wid/tags/:id/persons/:personId"
    description: "Remove tag from a person"
    params:
      path:
        wid:      { type: string, required: true }
        id:       { type: string, required: true }
        personId: { type: string, required: true }
