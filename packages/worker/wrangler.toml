name = "bogo"
main = "src/index.ts"
compatibility_date = "2025-03-14"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "bogo"
database_id = "128a2c4f-1819-4747-9704-e296b905a8ef"
migrations_dir = "migrations"

# Static assets configuration (Wrangler v4)
# SPA served from ./static, API handled by Worker code
[assets]
directory = "./static"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

[vars]
ENVIRONMENT = "development"

# Production environment overrides
# Usage: wrangler deploy --env production
# Secrets (set via `wrangler secret put`): CF_ACCESS_TEAM_DOMAIN, CF_ACCESS_AUD
[env.production]
name = "bogo"

[[env.production.d1_databases]]
binding = "DB"
database_name = "bogo"
database_id = "128a2c4f-1819-4747-9704-e296b905a8ef"
migrations_dir = "migrations"

[env.production.assets]
directory = "./static"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.routes]]
pattern = "bogo.hexly.ai"
custom_domain = true

# Second hostname for the CLI. CF Access protects `bogo.hexly.ai` (browser
# SPA + the /api/auth/cli consent page); `api.bogo.hexly.ai` is NOT covered
# by any Access application so CLI requests carrying a `Bearer bogo_*` token
# can reach the worker. Auth is still enforced by access-auth.ts inside the
# worker — bearer prefix check + sha256 lookup in api_tokens.
[[env.production.routes]]
pattern = "api.bogo.hexly.ai"
custom_domain = true
